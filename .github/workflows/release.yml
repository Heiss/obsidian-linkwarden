name: Release

# Tag a commit with the exact version (no "v" prefix, matching manifest.json),
# e.g. `git tag 0.1.0 && git push origin 0.1.0`. Obsidian's community-plugin
# release convention requires main.js, manifest.json and styles.css as loose
# assets on a GitHub release whose tag equals the manifest version.
on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  # Required for actions/attest-build-provenance to mint attestations.
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${MANIFEST_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version ${MANIFEST_VERSION}" >&2
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Cryptographic provenance so users can verify the assets were built from
      # this repo (per the Obsidian community-plugin review).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            main.js manifest.json styles.css
